<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Data Visualizer - Serverless Demo</title>
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Chart.js for data viz -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --primary-color: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.4);
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --border-radius: 16px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #020617, #0f172a);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            padding: 2rem;
            margin: 2rem 0;
            background: var(--surface-color);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out forwards;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-top: 0.5rem;
            font-size: 1.1rem;
        }

        .search-box {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 3rem;
        }

        input {
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.2);
            border-radius: 9999px;
            color: white;
            width: 100%;
            max-width: 400px;
            transition: all 0.3s ease;
            outline: none;
            font-family: inherit;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 15px var(--primary-glow);
            background: rgba(0, 0, 0, 0.4);
        }

        button {
            padding: 1rem 2rem;
            border: none;
            background: linear-gradient(to right, #3b82f6, #4f46e5);
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            border-radius: 9999px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            font-family: inherit;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px var(--primary-glow);
        }

        button:active {
            transform: translateY(0);
        }

        .loader {
            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }

        .dashboard {
            display: none;
            flex-direction: column;
            gap: 2rem;
            animation: fadeUp 0.6s ease-out forwards;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
        }

        .stat-title {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
        }

        .chart-container {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .error-message {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 2rem;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>Market Pulse</h1>
            <p class="subtitle">Real-time financial data powered by Serverless FastAPI</p>
        </header>

        <div class="search-box">
            <input type="text" id="tickerInput" placeholder="Enter stock ticker (e.g. AAPL, NVDA, ^NSEI)"
                onkeypress="handleKeyPress(event)">
            <button onclick="fetchData()">Analyze</button>
        </div>

        <div class="error-message" id="errorBox"></div>
        <div class="loader" id="loader"></div>

        <div class="dashboard" id="dashboard">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-title">Company / Index</div>
                    <div class="stat-value" id="companyName" style="font-size: 1.5rem; line-height: 2rem;">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Current Price</div>
                    <div class="stat-value" id="currentPrice">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Last Close</div>
                    <div class="stat-value" id="lastClose">-</div>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="stockChart" height="100"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Same-origin API base works for both Vercel and local server runs.
        const API_URL = "/api/stock";

        let chartInstance = null;

        function handleKeyPress(e) {
            if (e.key === 'Enter') fetchData();
        }

        async function fetchData() {
            const ticker = document.getElementById('tickerInput').value.trim();
            if (!ticker) return;

            // UI Reset
            document.getElementById('errorBox').style.display = 'none';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            try {
                const response = await fetch(`${API_URL}/${ticker}`);
                const data = await response.json();

                if (data.error) {
                    showError(data.error);
                } else {
                    updateDashboard(data);
                }
            } catch (error) {
                showError("Could not connect to the backend service.");
                console.error(error);
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function showError(msg) {
            const errBox = document.getElementById('errorBox');
            errBox.textContent = msg;
            errBox.style.display = 'block';
        }

        function updateDashboard(data) {
            document.getElementById('dashboard').style.display = 'flex';

            // Format currency
            const formatter = new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: data.currency || 'USD'
            });

            document.getElementById('companyName').textContent = data.name || data.ticker;

            const currentPriceText = data.current_price !== "N/A" ? formatter.format(data.current_price) : "N/A";
            document.getElementById('currentPrice').textContent = currentPriceText;

            const history = data.history;
            const lastDay = history[history.length - 1];
            document.getElementById('lastClose').textContent = formatter.format(lastDay.close);

            // Render Chart
            renderChart(data);
        }

        function renderChart(data) {
            const ctx = document.getElementById('stockChart').getContext('2d');

            if (chartInstance) {
                chartInstance.destroy();
            }

            const dates = data.history.map(d => d.date);
            const prices = data.history.map(d => d.close);

            // Gradient for line chart
            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(59, 130, 246, 0.5)');   // blue
            gradient.addColorStop(1, 'rgba(59, 130, 246, 0.0)');

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [{
                        label: 'Closing Price',
                        data: prices,
                        borderColor: '#60a5fa',
                        borderWidth: 3,
                        backgroundColor: gradient,
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#60a5fa',
                        pointHoverBackgroundColor: '#60a5fa',
                        pointHoverBorderColor: '#fff',
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            titleFont: { size: 14, family: 'Inter' },
                            bodyFont: { size: 14, family: 'Inter' },
                            padding: 12,
                            displayColors: false,
                            callbacks: {
                                label: function (context) {
                                    let label = context.dataset.label || '';
                                    if (label) {
                                        label += ': ';
                                    }
                                    if (context.parsed.y !== null) {
                                        label += new Intl.NumberFormat('en-US', { style: 'currency', currency: data.currency }).format(context.parsed.y);
                                    }
                                    return label;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { color: '#94a3b8', font: { family: 'Inter' } }
                        },
                        y: {
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { color: '#94a3b8', font: { family: 'Inter' } }
                        }
                    },
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    }
                }
            });
        }
    </script>
</body>

</html>
